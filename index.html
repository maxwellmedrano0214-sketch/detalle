<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¿Si me quieres? </title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #de8ba9; /* Fondo rosa base */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            text-align: center;
            user-select: none;
            position: relative;
            transition: background-color 1.5s ease;
        }

        body.oscuro {
            background-color: #000000 !important;
        }

        .card {
            background-color: rgba(255, 255, 255, 0.4);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(8px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 85%;
            z-index: 10;
            transition: opacity 1s ease, transform 1s ease;
        }

        .card.fade-out {
            opacity: 0;
            transform: scale(0.9);
            pointer-events: none;
        }

        h1 {
            color: #ffffff;
            font-size: 2.3rem;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.2);
            margin-bottom: 50px;
            font-weight: bold;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            height: 70px;
            position: relative;
        }

        .btn {
            padding: 15px 40px;
            font-size: 1.3rem;
            font-weight: bold;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
            transition: transform 0.1s ease;
        }

        #btn-si {
            background-color: #ff477e;
            color: white;
        }

        #btn-no {
            background-color: #ff7096;
            color: white;
            position: absolute;
            right: 50px;
        }

        .hidden {
            display: none !important;
        }

        .success-screen h1 {
            color: #d63384;
            font-size: 2.5rem;
            margin-bottom: 30px;
        }

        .btn-regalo {
            background-color: #ffffff;
            color: #d63384;
            display: inline-block;
            padding: 15px 35px;
            border-radius: 35px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }

        #flor-magica {
            position: absolute;
            top: 45%; 
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 450px;
            display: none;
            z-index: 50;
        }

        .svg-flor {
            width: 100%;
            height: 100%;
        }

        .tallo-anim {
            stroke-dasharray: 400;
            stroke-dashoffset: 400;
            animation: crecerTallo 3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            animation-delay: 0.5s;
        }

        .hoja-anim {
            transform: scale(0);
            transform-origin: center;
            animation: brotarHoja 2s ease-out forwards;
        }
        .hoja-1 { transform-origin: 130px 330px; animation-delay: 2s; }
        .hoja-2 { transform-origin: 170px 260px; animation-delay: 2.5s; }

        .petalo-tulipan {
            transform: scale(0);
            transform-origin: 150px 180px;
            animation: florecerTulipan 3.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        
        .p-centro { animation-delay: 3s; }
        .p-izq { animation-delay: 3.4s; transform-origin: 130px 180px; }
        .p-der { animation-delay: 3.7s; transform-origin: 170px 180px; }
        .p-frente { animation-delay: 4.1s; }

        .brillo {
            opacity: 0;
            animation: titilar 2s ease-in-out infinite alternate;
        }
        .b1 { animation-delay: 5s; }
        .b2 { animation-delay: 5.5s; }
        .b3 { animation-delay: 6s; }

        .mensaje-final {
            position: absolute;
            bottom: 8%;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.75);
            font-size: 1.1rem;
            font-style: italic;
            letter-spacing: 1px;
            opacity: 0;
            transition: opacity 2.5s ease-in-out;
            z-index: 60;
            width: 85%;
            max-width: 400px;
        }
        
        .mensaje-final.visible {
            opacity: 1;
        }

        @keyframes crecerTallo {
            to { stroke-dashoffset: 0; }
        }

        @keyframes brotarHoja {
            to { transform: scale(1); }
        }

        @keyframes florecerTulipan {
            0% { transform: scale(0) translateY(20px); opacity: 0; }
            40% { opacity: 1; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        @keyframes titilar {
            0% { opacity: 0; transform: scale(0.5); }
            100% { opacity: 0.9; transform: scale(1.2); }
        }
    </style>
</head>
<body>

    <div id="p-pregunta" class="card">
        <h1>¿Si me quieres? </h1>
        <div class="btn-container">
            <button id="btn-si" class="btn">Sí </button>
            <button id="btn-no" class="btn">No </button>
        </div>
    </div>

    <div id="p-exito" class="card hidden success-screen">
        <h1>ÑEJEJE LO SABIA </h1>
        <button id="btn-abrir-regalo" class="btn-regalo"> Toca para ver tu regalo</button>
    </div>

    <div id="flor-magica">
        <svg class="svg-flor" viewBox="0 0 300 500" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Tallo elegante -->
            <path class="tallo-anim" d="M150,450 Q140,300 150,180" stroke="#2d6a4f" stroke-width="7" stroke-linecap="round"/>
            
            <path class="hoja-anim hoja-1" d="M145,330 Q90,300 110,240 Q130,280 146,310" fill="#40916c" />
            <path class="hoja-anim hoja-2" d="M153,270 Q210,250 190,180 Q170,220 152,250" fill="#40916c" />
            
            <path class="petalo-tulipan p-centro" d="M150,80 C110,80 110,180 150,180 C190,180 190,80 150,80 Z" fill="#9d0208" />
            <path class="petalo-tulipan p-izq" d="M140,90 C95,100 110,180 150,180 C120,150 120,110 140,90 Z" fill="#d00000" />
            <path class="petalo-tulipan p-der" d="M160,90 C205,100 190,180 150,180 C180,150 180,110 160,90 Z" fill="#dc2f02" />
            <path class="petalo-tulipan p-frente" d="M150,100 C120,95 115,180 150,180 C185,180 180,95 150,100 Z" fill="#e85d04" />
            <path class="petalo-tulipan p-frente" d="M150,105 C130,102 125,175 150,175 C175,175 170,102 150,105 Z" fill="#f48c06" />

            <circle class="brillo b1" cx="100" cy="120" r="3" fill="#fff" />
            <circle class="brillo b2" cx="210" cy="140" r="4" fill="#ffea00" />
            <circle class="brillo b3" cx="150" cy="60" r="2.5" fill="#fff" />
        </svg>
    </div>

    <div id="mensaje-final" class="mensaje-final">
        "El corazón tiene razones que la razón no entiende" -Blaise Pascal
    </div>

    <script>
        const btnNo = document.getElementById('btn-no');
        const btnSi = document.getElementById('btn-si');
        const btnAbrirRegalo = document.getElementById('btn-abrir-regalo');
        const pPregunta = document.getElementById('p-pregunta');
        const pExito = document.getElementById('p-exito');
        const florMagica = document.getElementById('flor-magica');
        const body = document.body;

        function moverBotonNo() {
            const margen = 40;
            const xMax = window.innerWidth - btnNo.offsetWidth - margen;
            const yMax = window.innerHeight - btnNo.offsetHeight - margen;

            let randomX = Math.floor(Math.random() * xMax);
            let randomY = Math.floor(Math.random() * yMax);

            if(randomX < margen) randomX = margen;
            if(randomY < margen) randomY = margen;

            btnNo.style.position = 'fixed';
            btnNo.style.left = randomX + 'px';
            btnNo.style.top = randomY + 'px';
        }

        btnNo.addEventListener('mouseenter', moverBotonNo);
        btnNo.addEventListener('touchstart', (e) => {
            e.preventDefault(); 
            moverBotonNo();
        });

        btnSi.addEventListener('click', () => {
            pPregunta.classList.add('hidden');
            pExito.classList.remove('hidden');
            btnNo.style.display = 'none';
        });

        btnAbrirRegalo.addEventListener('click', () => {
            pExito.classList.add('fade-out');
            body.classList.add('oscuro');

            setTimeout(() => {
                pExito.classList.add('hidden');
                
                florMagica.style.display = 'block';
                
                setTimeout(() => {
                    document.getElementById('mensaje-final').classList.add('visible');
                }, 4500);
            }, 1000);
        });
    </script>
</body>
</html>
